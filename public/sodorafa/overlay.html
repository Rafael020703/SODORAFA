<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Overlay - Clipe Twitch</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      background: transparent;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0) 100%);
      pointer-events: none;
      z-index: 1;
    }

    #clip-container {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      padding: 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    #clip-container.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .clip-wrapper {
      position: relative;
      width: 100%;
      max-width: 92vw;
      aspect-ratio: 16 / 9;
      border-radius: 18px;
      overflow: hidden;
      animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 
        0 0 40px rgba(74, 158, 255, 0.4),
        0 0 80px rgba(45, 221, 200, 0.2),
        0 20px 60px rgba(0, 0, 0, 0.6);
    }

    #video-player {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: black;
      object-fit: contain;
    }

    .video-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 100%);
      z-index: 5;
    }

    .video-controls-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
      padding: 20px;
      z-index: 4;
      font-family: 'Arial', sans-serif;
      display: none;
    }

    .video-info {
      color: white;
      font-size: 14px;
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .video-info-left {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .clip-duration {
      background: rgba(255, 255, 255, 0.2);
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: bold;
    }

    .video-play-progress {
      width: 100%;
      height: 3px;
      background: rgba(255, 255, 255, 0.2);
      margin-top: 8px;
      cursor: pointer;
    }

    .video-play-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #4a9eff, #2ddddc);
      width: 0%;
      transition: width 0.1s linear;
    }

    .video-play-progress:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .video-play-progress:hover .video-play-progress-bar {
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.4);
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(74, 158, 255, 0.2);
      border-top-color: #4a9eff;
      border-right-color: #2dd4da;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .clip-info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.7) 100%);
      color: white;
      padding: 16px;
      font-family: 'Inter', Arial, sans-serif;
      z-index: 11;
      animation: slideUp 0.4s ease;
    }

    .clip-info p {
      margin: 0;
      font-size: 0.9rem;
      opacity: 0.9;
    }

    .error-overlay {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, rgba(15, 26, 53, 0.95), rgba(10, 14, 39, 0.95));
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(8px);
    }

    .error-content {
      text-align: center;
      max-width: 500px;
      padding: 40px;
      background: rgba(26, 42, 95, 0.4);
      border: 2px solid rgba(255, 107, 122, 0.5);
      border-radius: 16px;
      animation: fadeIn 0.4s ease;
    }

    .error-icon {
      font-size: 4rem;
      margin-bottom: 16px;
    }

    .error-content h2 {
      margin: 0 0 12px;
      color: #ff9b9b;
      font-size: 1.6rem;
    }

    .error-content p {
      margin: 0 0 16px;
      color: #b8c4e8;
      line-height: 1.5;
    }

    .error-link {
      display: inline-block;
      padding: 12px 24px;
      background: linear-gradient(135deg, #4a9eff, #2dd4da);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .error-link:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(74, 158, 255, 0.4);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes scaleIn {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 700px) {
      .clip-wrapper {
        max-width: 100vw;
        border-radius: 8px;
      }
      #clip-container {
        padding: 0.5rem;
      }
      .error-content {
        margin: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="clip-container">
    <div class="clip-wrapper">
      <div class="video-loading" id="video-loading">
        <div class="spinner"></div>
      </div>
      <video 
        id="video-player" 
        autoplay 
        playsinline 
        preload="metadata"
        crossorigin="anonymous"
        style="display: none;">
      </video>
      <div class="video-controls-overlay" id="video-controls" style="display: none;">
        <div class="video-info">
          <div class="video-info-left">
            <span id="clip-info">▶️ Clipe</span>
            <span class="clip-duration" id="clip-duration">0s</span>
          </div>
          <span id="current-time">0s / 0s</span>
        </div>
        <div class="video-play-progress" id="progress-bar">
          <div class="video-play-progress-bar" id="progress-fill"></div>
        </div>
      </div>
    </div>
  </div>

  <audio id="ban-sound" src="/sounds/ban.mp3" preload="auto"></audio>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    (async function () {
      const container = document.getElementById('clip-container');
      const videoPlayer = document.getElementById('video-player');
      const videoLoading = document.getElementById('video-loading');
      const videoControls = document.getElementById('video-controls');
      const clipInfo = document.getElementById('clip-info');
      const clipDuration = document.getElementById('clip-duration');
      const currentTime = document.getElementById('current-time');
      const progressBar = document.getElementById('progress-bar');
      const progressFill = document.getElementById('progress-fill');
      const banAudio = document.getElementById('ban-sound');

      let timeoutId = null;
      let videoEndTimeout = null;

      function fecharOverlay() {
        clearTimeout(timeoutId);
        clearTimeout(videoEndTimeout);
        try { videoPlayer.pause(); videoPlayer.src = ''; } catch(e){}
        container.classList.remove('visible');
        videoPlayer.style.display = 'none';
        videoLoading.style.display = 'flex';
        videoControls.style.display = 'none';
      }

      const parts = window.location.pathname.split('/');
      const channel = parts[parts.length - 1].toLowerCase();
      const parent = window.location.hostname;

      try {
        const check = await fetch(`/overlay/check/${encodeURIComponent(channel)}`);
        if (!check.ok) {
          const errorHTML = `
            <div class="error-overlay">
              <div class="error-content">
                <div class="error-icon">⚠️</div>
                <h2>Canal não encontrado</h2>
                <p>O canal "${channel}" não está registrado.</p>
                <a href="/sodorafa" class="error-link">Voltar ao Dashboard</a>
              </div>
            </div>
          `;
          container.innerHTML = errorHTML;
          container.classList.add('visible');
          return;
        }
      } catch (err) {
        console.error('Erro ao verificar canal:', err);
      }

      const socket = io({ query: { channel } });

      socket.on('connect', () => console.log('✓ Conectado'));
      socket.on('disconnect', () => console.log('✗ Desconectado'));

      socket.on('playBanSound', () => {
        banAudio.currentTime = 0;
        banAudio.play().catch(e => console.warn(e));
      });

      socket.on('novoClip', async (clipData) => {
        console.clear();
        console.log('═══════════════════════════════════════');
        console.log('🎥 NOVO CLIPE RECEBIDO');
        console.log('═══════════════════════════════════════');
        console.log('ID:', clipData.id);
        console.log('URL:', clipData.url);
        console.log('Duration:', clipData.duration + 's');
        console.log('═══════════════════════════════════════\n');

        const { id, duration, url, thumbnail } = clipData;

        if (!url || typeof duration !== 'number') {
          console.error('❌ Dados inválidos recebidos:', clipData);
          return;
        }

        if (videoEndTimeout) {
          clearTimeout(videoEndTimeout);
        }

        container.classList.add('visible');
        videoLoading.style.display = 'flex';
        videoControls.style.display = 'none';
        videoPlayer.style.display = 'none';

        clipInfo.textContent = `▶️ Clipe (${duration}s)`;
        clipDuration.textContent = `${duration}s`;
        currentTime.textContent = `0s / ${duration}s`;

        console.log(`📥 Carregando vídeo de: ${url}`);

        // Adiciona channel como query param
        const urlWithChannel = new URL(url, window.location.origin);
        urlWithChannel.searchParams.set('channel', channel);
        const videoUrl = urlWithChannel.toString();

        videoPlayer.src = videoUrl;

        const onLoadedMetadata = () => {
          console.log(`✅ Vídeo carregado! Duração: ${videoPlayer.duration}s`);
          videoLoading.style.display = 'none';
          videoControls.style.display = 'block';
          videoPlayer.style.display = 'block';
          videoPlayer.play().catch(err => {
            console.warn('⚠️ Autoplay bloqueado:', err.message);
          });
          videoPlayer.removeEventListener('loadedmetadata', onLoadedMetadata);
        };

        const onTimeUpdate = () => {
          const current = Math.round(videoPlayer.currentTime);
          const total = Math.round(videoPlayer.duration) || duration;
          currentTime.textContent = `${current}s / ${total}s`;
          
          const percent = (videoPlayer.currentTime / videoPlayer.duration) * 100;
          progressFill.style.width = percent + '%';
        };

        const onEnded = () => {
          console.log('✅ Vídeo terminou!');
          fecharOverlay();
          socket.emit('clipFinalizado');
          cleanup();
        };

        const onError = (e) => {
          console.error('❌ Erro ao reproduzir vídeo:', e);
          videoLoading.innerHTML = '<p>❌ Erro ao carregar vídeo</p>';
          
          setTimeout(() => {
            fecharOverlay();
            socket.emit('clipFinalizado');
          }, 3000);
          
          cleanup();
        };

        progressBar.addEventListener('click', (e) => {
          const rect = progressBar.getBoundingClientRect();
          const percent = (e.clientX - rect.left) / rect.width;
          videoPlayer.currentTime = percent * videoPlayer.duration;
        });

        const cleanup = () => {
          videoPlayer.removeEventListener('loadedmetadata', onLoadedMetadata);
          videoPlayer.removeEventListener('timeupdate', onTimeUpdate);
          videoPlayer.removeEventListener('ended', onEnded);
          videoPlayer.removeEventListener('error', onError);
          progressBar.removeEventListener('click', arguments.callee);
        };

        videoPlayer.addEventListener('loadedmetadata', onLoadedMetadata, { once: true });
        videoPlayer.addEventListener('timeupdate', onTimeUpdate);
        videoPlayer.addEventListener('ended', onEnded, { once: true });
        videoPlayer.addEventListener('error', onError, { once: true });

        videoEndTimeout = setTimeout(() => {
          console.warn('⏱️ Timeout: encerrando clipe após ' + (duration + 2) + 's');
          fecharOverlay();
          socket.emit('clipFinalizado');
          cleanup();
        }, (duration + 2) * 1000);

        console.log(`⏰ Timeout configurado para ${(duration + 2)}s`);
      });

      socket.on('fecharOverlay', () => {
        console.log('🔒 Fechando');
        fecharOverlay();
      });

      console.log('🚀 Overlay com HTML5 Video pronto para', channel);
    })();
  </script>
</body>
</html>
