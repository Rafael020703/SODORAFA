<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AutoClipes - reprodução contínua</title>
  <style>
    * { box-sizing: border-box }
    html,body{height:100%;margin:0;background:#000;color:#000;font-family:Inter,Arial,Helvetica,sans-serif}
    /* mostra apenas o container (fundo preto) — iframe será exibido quando o clip realmente iniciar */
    #clip-container{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:0;margin:0;z-index:9999;background:#000}
    #twitch-embed{width:100%;max-width:92vw;aspect-ratio:16/9;border-radius:0;border:0;box-shadow:none;background:#000;display:none}
    @media (max-width:700px){#twitch-embed{max-width:100vw;border-radius:0}}
  </style>
</head>
<body>
  <div id="clip-container">
    <iframe id="twitch-embed" allowfullscreen allow="autoplay; fullscreen" scrolling="no"></iframe>
  </div> 

  <script>
    (async function(){
      const parts = window.location.pathname.split('/');
      const channel = parts[parts.length-1]?.toLowerCase();
      const parent = window.location.hostname;
      const container = document.getElementById('clip-container');
      const iframe = document.getElementById('twitch-embed');

      if (!channel || !/^[a-z0-9_]{3,25}$/.test(channel)) {
        console.warn('Canal inválido na URL:', channel);
        return;
      }

      console.log('Carregando clipes de', channel);

      // busca clipes do servidor (usando token do servidor)
      let clips = [];
      try {
        const res = await fetch(`/api/public/clips/${encodeURIComponent(channel)}`);
        if (!res.ok) {
          console.warn('Erro ao buscar clipes:', res.status);
          hideOverlay();
          return;
        }
        clips = await res.json();
      } catch (e) {
        console.error('Erro de rede ao buscar clipes.', e);
        hideOverlay();
        return;
      }

      if (!clips || clips.length === 0) {
        console.warn('Nenhum clipe público encontrado para', channel);
        hideOverlay();
        return;
      }

      console.log('Pronto — reproduzindo clipes de', channel);

      // timers / handlers
      let playDetected = false;
      let playWaitTimeout = null;
      let safetyTimeout = null;
      let durationTimer = null;
      let iframeMsgHandler = null;
      let stopped = false;

      function clearHandlers() {
        playDetected = false;
        if (playWaitTimeout) { clearTimeout(playWaitTimeout); playWaitTimeout = null; }
        if (safetyTimeout) { clearTimeout(safetyTimeout); safetyTimeout = null; }
        if (durationTimer) { clearTimeout(durationTimer); durationTimer = null; }
        if (iframeMsgHandler) { window.removeEventListener('message', iframeMsgHandler); iframeMsgHandler = null; }
      }

      function showOverlay() {
        try { container.style.display = 'flex'; iframe.style.display = 'block'; msg.style.display = 'none'; }
        catch(e){}
      }
      function hideOverlay() {
        try { container.style.display = 'none'; iframe.style.display = 'none'; }
        catch(e){}
      }

      function nextClipDelayed(delay = 400) {
        clearHandlers();
        setTimeout(() => { if (!stopped) playRandomClip(); }, delay);
      }

      async function playRandomClip() {
        if (stopped) return;
        clearHandlers();
        // pick random
        const pick = clips[Math.floor(Math.random()*clips.length)];
        if (!pick) { console.warn('no pick'); return; }
        const id = pick.id;
        const dur = Number(pick.duration) || 10;
        console.log('reproduzindo', id);

        // prepare handlers
        iframeMsgHandler = function(ev) {
          try {
            const data = ev.data;
            if (!data) return;
            const dstr = typeof data === 'string' ? data.toLowerCase() : JSON.stringify(data).toLowerCase();
            if (dstr.includes('play') || dstr.includes('playing') || dstr.includes('started')) {
              if (playDetected) return;
              playDetected = true;
              console.log('play detectado', id);
              showOverlay();
              clearHandlers();
              durationTimer = setTimeout(() => { console.log('fim por duração', id); nextClipDelayed(); }, (dur + 1) * 1000);
            }
            if (dstr.includes('ended') || dstr.includes('complete') || dstr.includes('finished')) {
              console.log('ended detectado', id);
              nextClipDelayed();
            }
          } catch(e){ console.warn('erro msg', e); }
        };
        window.addEventListener('message', iframeMsgHandler);

        iframe.onload = () => {
          console.log('iframe onload', id);
          playWaitTimeout = setTimeout(() => {
            if (!playDetected) {
              console.log('fallback onload assume play', id);
              showOverlay();
              clearHandlers();
              durationTimer = setTimeout(() => { console.log('fim fallback por duração', id); nextClipDelayed(); }, (dur + 1) * 1000);
            }
          }, 1500);
        };

        // safety to skip stuck clips
        safetyTimeout = setTimeout(() => {
          console.warn('safety timeout — avançando', id);
          nextClipDelayed();
        }, 15000);

        // start
        iframe.src = `https://clips.twitch.tv/embed?clip=${encodeURIComponent(id)}&parent=${encodeURIComponent(parent)}&autoplay=true&controls=false`;
      }

      // start playing
      playRandomClip();

      // ESC para parar
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          stopped = true;
          clearHandlers();
          hideOverlay();
          msg.textContent = 'Reprodução parada (ESC). Atualize para reiniciar.';
          fallback.style.display = 'none';
        }
      });



    })();
  </script>
</body>
</html>
