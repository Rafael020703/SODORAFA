<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIVESTWITCH - Monitorar Streamers</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0e27;
      --bg-secondary: #111d44;
      --bg-tertiary: #1a2963;
      --text-primary: #f0f4ff;
      --text-secondary: #b8c4e8;
      --accent-blue: #4a9eff;
      --accent-cyan: #2dd4da;
      --accent-pink: #f472b6;
      --accent-green: #4ade80;
      --accent-red: #ff6b6b;
      --accent-purple: #a78bfa;
      --glass-bg: rgba(17, 29, 68, 0.6);
      --glass-bg-light: rgba(26, 41, 99, 0.4);
      --border-color: rgba(74, 158, 255, 0.1);
    }

    body {
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ==================== HEADER ==================== */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 3rem;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      padding: 2rem;
      border-radius: 16px;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-buttons {
      display: flex;
      gap: 1rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(74, 158, 255, 0.3);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
    }

    .btn-secondary:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    /* ==================== SECTION TITLE ==================== */
    .section-title {
      font-size: 1.8rem;
      font-weight: 800;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    /* ==================== STATS GRID ==================== */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .stat-card {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 2rem;
      text-align: center;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      border-color: var(--accent-cyan);
      background: var(--glass-bg-light);
    }

    .stat-icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: 0.95rem;
      margin-top: 0.5rem;
    }

    /* ==================== STREAMERS SECTION ==================== */
    .section {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 2rem;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .section-header h2 {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .add-streamer-btn {
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, var(--accent-green), #22c55e);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .add-streamer-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(74, 173, 128, 0.3);
    }

    .streamers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
    }

    .streamer-card {
      background: var(--glass-bg-light);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.5rem;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .streamer-card:hover {
      border-color: var(--accent-cyan);
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(45, 212, 218, 0.15);
    }

    .streamer-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .streamer-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid var(--accent-cyan);
      object-fit: cover;
    }

    .streamer-info {
      flex: 1;
    }

    .streamer-name {
      font-weight: 700;
      font-size: 1.1rem;
      color: var(--accent-cyan);
      margin-bottom: 0.25rem;
    }

    .streamer-id {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .streamer-status {
      padding: 0.5rem 1rem;
      background: var(--accent-green);
      color: #000;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.8rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    .streamer-status.offline {
      background: var(--text-secondary);
      color: var(--text-primary);
    }

    .streamer-status.monitoring {
      background: var(--accent-blue);
      color: white;
    }

    .streamer-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
      padding: 1rem 0;
      border-top: 1px solid var(--border-color);
      border-bottom: 1px solid var(--border-color);
    }

    .stat-item {
      text-align: center;
    }

    .stat-item-value {
      font-weight: 700;
      font-size: 1.3rem;
      color: var(--accent-blue);
    }

    .stat-item-label {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }

    .streamer-actions {
      display: flex;
      gap: 0.75rem;
    }

    .action-btn {
      flex: 1;
      padding: 0.75rem;
      border: 1px solid var(--border-color);
      background: transparent;
      color: var(--accent-cyan);
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      transition: all 0.2s ease;
    }

    .action-btn:hover {
      background: var(--accent-cyan);
      color: var(--bg-primary);
      border-color: var(--accent-cyan);
    }

    .action-btn.danger {
      color: var(--accent-red);
      border-color: var(--accent-red);
    }

    .action-btn.danger:hover {
      background: var(--accent-red);
      color: white;
    }

    /* ==================== MODAL ==================== */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 2rem;
      max-width: 500px;
      width: 90vw;
    }

    .modal-header {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--text-secondary);
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem;
      background: var(--glass-bg);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-primary);
      font-family: inherit;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent-cyan);
      box-shadow: 0 0 10px rgba(45, 212, 218, 0.2);
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
    }

    .modal-actions button {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .modal-actions .btn-confirm {
      background: var(--accent-green);
      color: white;
    }

    .modal-actions .btn-confirm:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(74, 173, 128, 0.3);
    }

    .modal-actions .btn-cancel {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
    }

    .modal-actions .btn-cancel:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    /* ==================== EMPTY STATE ==================== */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .empty-state p {
      margin: 0.5rem 0;
      font-size: 1.1rem;
    }

    /* ==================== RESPONSIVE ==================== */
    @media (max-width: 768px) {
      body {
        padding: 1rem;
      }

      header {
        flex-direction: column;
        text-align: center;
        gap: 1rem;
      }

      .section {
        padding: 1rem;
      }

      .streamers-grid {
        grid-template-columns: 1fr;
      }

      .streamer-stats {
        grid-template-columns: 1fr;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }
    }

    .hidden {
      display: none !important;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
    }

    /* STEPS */
    .step-content {
      animation: fadeIn 0.3s ease-in;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- HEADER -->
    <header>
      <div class="logo">📡 LIVESTWITCH - Monitorar</div>
      <div class="nav-buttons">
        <a href="/home" class="btn btn-secondary">🏠 Home</a>
        <a href="/profile" class="btn btn-secondary">👤 Perfil</a>
        <a href="/logout" class="btn btn-secondary">🚪 Sair</a>
      </div>
    </header>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">📡</div>
        <div class="stat-value" id="totalStreamers">0</div>
        <div class="stat-label">Streamers Monitorados</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🔴</div>
        <div class="stat-value" id="liveStreamers">0</div>
        <div class="stat-label">Ao Vivo Agora</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📊</div>
        <div class="stat-value" id="totalViewers">0</div>
        <div class="stat-label">Espectadores Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏰</div>
        <div class="stat-value" id="nextCheck">1m</div>
        <div class="stat-label">Próxima Verificação</div>
      </div>
    </div>

    <!-- STREAMERS SECTION -->
    <div class="section">
      <div class="section-header">
        <h2>📺 Meus Streamers</h2>
        <button class="add-streamer-btn" onclick="openAddStreamerModal()">+ Adicionar Streamer</button>
      </div>

      <div id="streamersContainer" class="streamers-grid">
        <div class="loading">Carregando streamers...</div>
      </div>
    </div>
  </div>

  <!-- ADD STREAMER MODAL - STEP BY STEP -->
  <div id="addStreamerModal" class="modal">
    <div class="modal-content">
      <!-- STEP 1: SELECIONAR SERVIDOR -->
      <div id="step1-selectServer" class="step-content">
        <div class="modal-header">📡 Selecionar Servidor Discord</div>
        <div class="form-group">
          <label>Escolha um servidor onde você é administrador:</label>
          <select id="guildSelect" style="width: 100%; padding: 0.75rem; background: var(--glass-bg); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary); font-family: inherit; cursor: pointer;">
            <option value="">Carregando servidores...</option>
          </select>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeAddStreamerModal()">Cancelar</button>
          <button class="btn-confirm" onclick="selectGuild()">Próximo</button>
        </div>
      </div>

      <!-- STEP 2: SELECIONAR CANAL -->
      <div id="step2-selectChannel" class="step-content hidden">
        <div class="modal-header">💬 Selecionar Canal</div>
        <div class="form-group">
          <label>Escolha um canal para receber notificações:</label>
          <select id="channelSelect" style="width: 100%; padding: 0.75rem; background: var(--glass-bg); border: 1px solid var(--border-color); border-radius: 6px; color: var(--text-primary); font-family: inherit; cursor: pointer;">
            <option value="">Carregando canais...</option>
          </select>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="goBackStep1()">Voltar</button>
          <button class="btn-confirm" onclick="selectChannel()">Próximo</button>
        </div>
      </div>

      <!-- STEP 3: NOME DO STREAMER -->
      <div id="step3-streamerName" class="step-content hidden">
        <div class="modal-header">🎮 Qual streamer você quer monitorar?</div>
        <div class="form-group">
          <label>Nome do Streamer (Twitch)</label>
          <input type="text" id="streamerNameInput" placeholder="Digite o nick do streamer...">
        </div>
        <div style="padding: 1rem; background: var(--glass-bg); border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; color: var(--text-secondary);">
          <strong>Server:</strong> <span id="selectedGuildName">-</span><br>
          <strong>Canal:</strong> <span id="selectedChannelName">-</span>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="goBackStep2()">Voltar</button>
          <button class="btn-confirm" onclick="addStreamer()">Adicionar Streamer</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let streamers = [];
    let liveData = {};
    let nextCheckTime = 60;
    let currentUser = null;
    let discordConnected = false;
    let selectedGuild = null;
    let selectedChannel = null;

    async function checkUserProfile() {
      try {
        console.log('[MONITORING] Verificando perfil do usuário...');
        const res = await fetch('/api/profile', {
          credentials: 'include'
        });
        
        if (res.ok) {
          currentUser = await res.json();
          discordConnected = currentUser.discordId || false;
          console.log('[MONITORING] Perfil carregado:', {
            username: currentUser.username,
            discordId: currentUser.discordId,
            discordConnected
          });
          
          if (!discordConnected) {
            console.warn('[MONITORING] Discord não conectado, mostrando aviso');
            showDiscordWarning();
          }
        } else {
          console.warn('[MONITORING] Erro ao carregar perfil, status:', res.status);
        }
      } catch (err) {
        console.error('[MONITORING] Erro ao carregar perfil:', err);
        console.error('[MONITORING] Stack:', err.stack);
      }
    }

    function showDiscordWarning() {
      const container = document.getElementById('streamersContainer');
      container.innerHTML = `
        <div style="grid-column: 1 / -1;">
          <div class="empty-state" style="background: var(--glass-bg); padding: 3rem; border-radius: 12px; border: 2px solid var(--accent-red);">
            <div class="empty-state-icon">⚠️</div>
            <p style="color: var(--accent-red); margin-bottom: 1rem;"><strong>Discord Não Vinculado!</strong></p>
            <p>Para monitorar streamers e receber notificações, você precisa vincular sua conta do Discord.</p>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-top: 0.5rem;">As notificações de lives serão enviadas para um servidor Discord que você administra.</p>
            <button class="btn" style="margin-top: 1rem; background: var(--accent-red);" onclick="window.location.href='/profile'">🔗 Vincular Discord no Perfil</button>
          </div>
        </div>
      `;
    }

    async function loadStreamers() {
      try {
        console.log('[MONITORING] Carregando streamers monitorados...');
        const res = await fetch('/api/streamers', {
          credentials: 'include'
        });

        console.log('[MONITORING] Response status:', res.status);
        
        if (!res.ok) {
          throw new Error(`Erro ao carregar streamers (status ${res.status})`);
        }

        streamers = await res.json();
        console.log('[MONITORING] Streamers carregados:', streamers.length, 'streamers');
        renderStreamersGrid();
        updateStats();
      } catch (err) {
        console.error('[MONITORING] Erro ao carregar streamers:', err);
        console.error('[MONITORING] Stack:', err.stack);
        showError('Erro ao carregar streamers');
      }
    }

    function renderStreamersGrid() {
      const container = document.getElementById('streamersContainer');

      if (streamers.length === 0) {
        container.innerHTML = `
          <div style="grid-column: 1 / -1;">
            <div class="empty-state">
              <div class="empty-state-icon">📭</div>
              <p>Você não está monitorando nenhum streamer ainda</p>
              <button class="btn" style="margin-top: 1rem;" onclick="openAddStreamerModal()">Adicionar Primeiro Streamer</button>
            </div>
          </div>
        `;
        return;
      }

      container.innerHTML = streamers.map(streamer => {
        const isOnline = liveData[streamer.id] || false;
        return `
          <div class="streamer-card">
            <div class="streamer-header">
              <img src="${streamer.profileImageUrl}" alt="${streamer.displayName}" class="streamer-avatar" onerror="this.src='/img/default-avatar.png'">
              <div class="streamer-info">
                <div class="streamer-name">${streamer.displayName}</div>
                <div class="streamer-id">${streamer.id}</div>
              </div>
            </div>

            <div class="streamer-status ${isOnline ? '' : 'offline'}">
              ${isOnline ? '🔴 AO VIVO' : '⚫ OFFLINE'}
            </div>

            <div class="streamer-stats">
              <div class="stat-item">
                <div class="stat-item-value">${streamer.followers || 0}</div>
                <div class="stat-item-label">Seguidores</div>
              </div>
              <div class="stat-item">
                <div class="stat-item-value">${streamer.viewCount || 0}</div>
                <div class="stat-item-label">Visualizações</div>
              </div>
            </div>

            <div class="streamer-actions">
              <button class="action-btn" onclick="viewStreamerProfile('${streamer.id}')">👁️ Ver</button>
              <button class="action-btn" onclick="toggleMonitoring('${streamer.id}')">🔔 Notif</button>
              <button class="action-btn danger" onclick="removeStreamer('${streamer.id}')">🗑️ Remover</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function updateStats() {
      const onlineCount = Object.values(liveData).filter(v => v).length;
      const totalViewers = streamers.reduce((sum, s) => sum + (s.viewCount || 0), 0);

      document.getElementById('totalStreamers').textContent = streamers.length;
      document.getElementById('liveStreamers').textContent = onlineCount;
      document.getElementById('totalViewers').textContent = totalViewers.toLocaleString('pt-BR');
    }

    function openAddStreamerModal() {
      if (!discordConnected) {
        showError('Você precisa vincular sua conta do Discord primeiro!');
        setTimeout(() => window.location.href = '/profile', 2000);
        return;
      }
      document.getElementById('addStreamerModal').classList.add('active');
    }

    function closeAddStreamerModal() {
      document.getElementById('addStreamerModal').classList.remove('active');
      document.getElementById('streamerNameInput').value = '';
    }

    async function openAddStreamerModal() {
      if (!discordConnected) {
        showError('Você precisa vincular sua conta do Discord primeiro!');
        setTimeout(() => window.location.href = '/profile', 2000);
        return;
      }
      
      document.getElementById('addStreamerModal').classList.add('active');
      selectedGuild = null;
      selectedChannel = null;
      await loadGuilds();
      showStep(1);
    }

    function closeAddStreamerModal() {
      document.getElementById('addStreamerModal').classList.remove('active');
      document.getElementById('streamerNameInput').value = '';
      selectedGuild = null;
      selectedChannel = null;
    }

    function showStep(stepNum) {
      // Ocultar todos os steps
      document.getElementById('step1-selectServer').classList.add('hidden');
      document.getElementById('step2-selectChannel').classList.add('hidden');
      document.getElementById('step3-streamerName').classList.add('hidden');
      
      // Mostrar apenas o step solicitado
      if (stepNum === 1) {
        document.getElementById('step1-selectServer').classList.remove('hidden');
      } else if (stepNum === 2) {
        document.getElementById('step2-selectChannel').classList.remove('hidden');
      } else if (stepNum === 3) {
        document.getElementById('step3-streamerName').classList.remove('hidden');
      }
    }

    async function loadGuilds() {
      try {
        console.log('[MONITORING] Carregando servidores Discord...');
        const res = await fetch('/api/discord/guilds', {
          credentials: 'include'
        });

        if (!res.ok) {
          throw new Error(`Erro ao carregar servidores (status ${res.status})`);
        }

        const data = await res.json();
        const guilds = data.guilds || [];
        console.log('[MONITORING] Servidores carregados:', guilds.length);

        const select = document.getElementById('guildSelect');
        select.innerHTML = guilds.map(g => 
          `<option value="${g.id}|${g.name}">${g.name}</option>`
        ).join('');

        if (guilds.length === 0) {
          select.innerHTML = '<option disabled>Nenhum servidor disponível</option>';
        }
      } catch (err) {
        console.error('[MONITORING] Erro ao carregar servidores:', err);
        showError('Erro ao carregar servidores Discord');
      }
    }

    async function selectGuild() {
      const value = document.getElementById('guildSelect').value;
      if (!value) {
        showError('Selecione um servidor');
        return;
      }

      const [guildId, guildName] = value.split('|');
      selectedGuild = { id: guildId, name: guildName };
      console.log('[MONITORING] Servidor selecionado:', selectedGuild);

      await loadChannels(guildId);
      showStep(2);
    }

    async function loadChannels(guildId) {
      try {
        console.log('[MONITORING] Carregando canais do servidor:', guildId);
        const res = await fetch(`/api/discord/guilds/${guildId}/channels`, {
          credentials: 'include'
        });

        if (!res.ok) {
          throw new Error(`Erro ao carregar canais (status ${res.status})`);
        }

        const data = await res.json();
        const channels = data.channels || [];
        console.log('[MONITORING] Canais carregados:', channels.length);

        const select = document.getElementById('channelSelect');
        select.innerHTML = channels.map(c =>
          `<option value="${c.id}|${c.name}"># ${c.name}</option>`
        ).join('');

        if (channels.length === 0) {
          select.innerHTML = '<option disabled>Nenhum canal disponível</option>';
        }
      } catch (err) {
        console.error('[MONITORING] Erro ao carregar canais:', err);
        showError('Erro ao carregar canais');
      }
    }

    async function selectChannel() {
      const value = document.getElementById('channelSelect').value;
      if (!value) {
        showError('Selecione um canal');
        return;
      }

      const [channelId, channelName] = value.split('|');
      selectedChannel = { id: channelId, name: channelName };
      console.log('[MONITORING] Canal selecionado:', selectedChannel);

      // Atualizar display do channel selecionado
      document.getElementById('selectedGuildName').textContent = selectedGuild.name;
      document.getElementById('selectedChannelName').textContent = '#' + channelName;

      showStep(3);
    }

    function goBackStep1() {
      selectedChannel = null;
      showStep(1);
    }

    function goBackStep2() {
      selectedGuild = null;
      showStep(2);
      loadChannels(selectedChannel.id);
    }

    async function addStreamer() {
      const name = document.getElementById('streamerNameInput').value.trim();

      if (!name) {
        showError('Digite o nome do streamer');
        return;
      }

      if (!selectedGuild || !selectedChannel) {
        showError('Servidor ou canal não selecionado');
        return;
      }

      try {
        console.log('[MONITORING] Adicionando streamer:', {
          name,
          guildId: selectedGuild.id,
          channelId: selectedChannel.id
        });

        const res = await fetch('/api/streamers', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            streamerName: name,
            discordServerId: selectedGuild.id,
            discordChannelId: selectedChannel.id
          })
        });

        if (!res.ok) {
          const error = await res.json();
          throw new Error(error.error || 'Erro ao adicionar streamer');
        }

        const result = await res.json();
        console.log('[MONITORING] Streamer adicionado:', result);

        showSuccess('Streamer adicionado com sucesso!');
        closeAddStreamerModal();
        await loadStreamers();
      } catch (err) {
        console.error('[MONITORING] Erro ao adicionar streamer:', err);
        showError(err.message || 'Erro ao adicionar streamer');
      }
    }

    async function removeStreamer(streamerId) {
      if (!confirm('Tem certeza que deseja remover?')) return;

      try {
        const res = await fetch(`/api/streamers/${streamerId}`, {
          method: 'DELETE',
          credentials: 'include'
        });

        if (res.ok) {
          await loadStreamers();
          showSuccess('Streamer removido!');
        }
      } catch (err) {
        showError('Erro ao remover streamer');
      }
    }

    function viewStreamerProfile(streamerId) {
      window.open(`https://twitch.tv/${streamerId}`, '_blank');
    }

    function toggleMonitoring(streamerId) {
      alert('Notificações habilitadas para ' + streamerId);
    }

    function showSuccess(msg) {
      alert('✅ ' + msg);
    }

    function showError(msg) {
      alert('❌ ' + msg);
    }

    // Inicializar
    document.addEventListener('DOMContentLoaded', () => {
      checkUserProfile();
      loadStreamers();
      setInterval(() => {
        nextCheckTime--;
        if (nextCheckTime === 0) {
          loadStreamers();
          nextCheckTime = 60;
        }
        document.getElementById('nextCheck').textContent = nextCheckTime + 's';
      }, 1000);
    });
  </script>
</body>
</html>
