<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIVESTWITCH - Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0e27;
      --bg-secondary: #111d44;
      --bg-tertiary: #1a2963;
      --text-primary: #f0f4ff;
      --text-secondary: #b8c4e8;
      --accent-blue: #4a9eff;
      --accent-cyan: #2dd4da;
      --accent-pink: #f472b6;
      --accent-purple: #a78bfa;
      --accent-green: #4ade80;
      --accent-red: #ff6b6b;
      --glass-bg: rgba(17, 29, 68, 0.6);
      --glass-bg-light: rgba(26, 41, 99, 0.4);
      --border-color: rgba(74, 158, 255, 0.1);
    }

    body {
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* HEADER */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      padding: 2rem;
      border-radius: 16px;
      margin-bottom: 3rem;
    }

    .logo {
      font-size: 2rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(74, 158, 255, 0.3);
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
    }

    .btn-secondary:hover {
      border-color: var(--accent-cyan);
      color: var(--accent-cyan);
    }

    /* STATS GRID */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      margin-bottom: 3rem;
    }

    .stat-card {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      border-color: var(--accent-cyan);
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(45, 212, 218, 0.15);
    }

    .stat-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .stat-value {
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    .stat-label {
      color: var(--text-secondary);
      font-size: 0.95rem;
      font-weight: 500;
    }

    /* SECTION */
    .section {
      margin-bottom: 4rem;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .section-header h2 {
      font-size: 1.8rem;
      color: var(--text-primary);
      margin: 0;
    }

    /* STREAMERS GRID */
    .streamers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
    }

    .streamer-card {
      background: linear-gradient(135deg, var(--glass-bg), var(--glass-bg-light));
      backdrop-filter: blur(10px);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .streamer-card:hover {
      transform: translateY(-8px);
      border-color: var(--accent-cyan);
      box-shadow: 0 20px 40px rgba(45, 212, 218, 0.2);
    }

    .streamer-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1.5rem;
      background: rgba(0, 0, 0, 0.2);
      border-bottom: 1px solid var(--border-color);
    }

    .streamer-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: 2px solid var(--accent-cyan);
      object-fit: cover;
    }

    .streamer-info {
      flex: 1;
    }

    .streamer-name {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent-cyan);
      margin-bottom: 0.25rem;
    }

    .streamer-id {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .streamer-status {
      padding: 1.5rem;
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      background: rgba(0, 0, 0, 0.1);
    }

    .streamer-status.online {
      color: var(--accent-green);
      background: rgba(74, 221, 128, 0.1);
    }

    .streamer-status.offline {
      color: var(--text-secondary);
    }

    .streamer-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      padding: 1.5rem;
    }

    .stat-item {
      text-align: center;
    }

    .stat-item-value {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent-blue);
    }

    .stat-item-label {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
    }

    .streamer-actions {
      display: flex;
      gap: 0.5rem;
      padding: 1.5rem;
      padding-top: 0;
    }

    .action-btn {
      flex: 1;
      padding: 0.75rem;
      background: rgba(74, 158, 255, 0.1);
      border: 1px solid rgba(74, 158, 255, 0.3);
      color: var(--accent-blue);
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }

    .action-btn:hover {
      background: rgba(74, 158, 255, 0.2);
      border-color: var(--accent-blue);
    }

    .action-btn.danger {
      background: rgba(255, 107, 122, 0.1);
      border-color: rgba(255, 107, 122, 0.3);
      color: var(--accent-red);
    }

    .action-btn.danger:hover {
      background: rgba(255, 107, 122, 0.2);
      border-color: var(--accent-red);
    }

    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }

    .empty-state-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .add-streamer-btn {
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, var(--accent-green), #5cd65c);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .add-streamer-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(74, 221, 128, 0.3);
    }

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }

      .streamers-grid {
        grid-template-columns: 1fr;
      }

      .section-header {
        flex-direction: column;
        gap: 1rem;
        align-items: flex-start;
      }
    }

    .hidden {
      display: none !important;
    }

    .loading {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- HEADER -->
    <header>
      <div class="logo">📡 LIVESTWITCH</div>
      <div class="header-right">
        <a href="/home" class="btn btn-secondary">🏠 Voltar</a>
        <a href="/livestwitch" class="btn">📡 Gerenciar</a>
        <a href="/profile" class="btn btn-secondary">👤 Perfil</a>
        <a href="/logout" class="btn btn-secondary">🚪 Sair</a>
      </div>
    </header>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">🎮</div>
        <div class="stat-value" id="onlineCount">0</div>
        <div class="stat-label">Online Agora</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📺</div>
        <div class="stat-value" id="totalMonitored">0</div>
        <div class="stat-label">Total Monitorado</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📊</div>
        <div class="stat-value" id="totalUsers">0</div>
        <div class="stat-label">Usuários Ativos</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⏰</div>
        <div class="stat-value" id="uptime">0h</div>
        <div class="stat-label">Server Uptime</div>
      </div>
    </div>

    <!-- LIVES SECTION -->
    <div class="section" id="livesSection" style="display: none;">
      <div class="section-header">
        <h2>🔴 Ao Vivo Agora</h2>
      </div>
      <div id="livesContainer" class="streamers-grid">
        <div class="loading">Carregando lives...</div>
      </div>
    </div>

    <!-- STREAMERS SECTION -->
    <div class="section">
      <div class="section-header">
        <h2>📡 Meus Streamers</h2>
        <button class="add-streamer-btn" onclick="window.location.href='/livestwitch'">+ Gerenciar</button>
      </div>

      <div id="streamersContainer" class="streamers-grid">
        <div class="loading">Carregando streamers...</div>
      </div>
    </div>
  </div>

  <script>
    let streamers = [];
    let stats = {};

    async function checkAuth() {
      try {
        const res = await fetch('/api/profile', { credentials: 'include' });
        if (!res.ok) {
          window.location.href = '/auth/twitch';
        }
      } catch (err) {
        console.error('Erro ao verificar autenticação:', err);
      }
    }

    async function loadStreamers() {
      try {
        const res = await fetch('/api/streamers', { credentials: 'include' });
        if (!res.ok) throw new Error(`Status ${res.status}`);
        
        streamers = await res.json();
        renderStreamers();
        updateStats();
      } catch (err) {
        console.error('[SODORAFA] Erro ao carregar streamers:', err);
      }
    }

    function renderStreamers() {
      const container = document.getElementById('streamersContainer');

      if (streamers.length === 0) {
        container.innerHTML = `
          <div style="grid-column: 1 / -1;">
            <div class="empty-state">
              <div class="empty-state-icon">📭</div>
              <p>Você não está monitorando nenhum streamer ainda</p>
              <button class="add-streamer-btn" style="margin-top: 1rem;" onclick="window.location.href='/livestwitch'">Adicionar Streamer</button>
            </div>
          </div>
        `;
        return;
      }

      container.innerHTML = streamers.map(s => `
        <div class="streamer-card">
          <div class="streamer-header">
            <img src="${s.profileImageUrl}" alt="${s.displayName}" class="streamer-avatar" onerror="this.src='/img/default-avatar.png'">
            <div class="streamer-info">
              <div class="streamer-name">${s.displayName}</div>
              <div class="streamer-id">${s.id}</div>
            </div>
          </div>

          <div class="streamer-status ${s.isLive ? 'online' : 'offline'}">
            ${s.isLive ? '🔴 AO VIVO' : '⚫ OFFLINE'}
          </div>

          <div class="streamer-stats">
            <div class="stat-item">
              <div class="stat-item-value">${s.followers || 0}</div>
              <div class="stat-item-label">Seguidores</div>
            </div>
            <div class="stat-item">
              <div class="stat-item-value">${s.viewCount || 0}</div>
              <div class="stat-item-label">Visualizações</div>
            </div>
          </div>

          <div class="streamer-actions">
            <button class="action-btn" onclick="openStreamer('${s.id}')">👁️ Ver</button>
            <button class="action-btn danger" onclick="removeStreamer('${s.id}')">🗑️ Remover</button>
          </div>
        </div>
      `).join('');

      updateLives();
    }

    function updateLives() {
      const liveStreamers = streamers.filter(s => s.isLive);
      const section = document.getElementById('livesSection');
      const container = document.getElementById('livesContainer');

      if (liveStreamers.length === 0) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';
      container.innerHTML = liveStreamers.map(s => `
        <div class="streamer-card">
          <div class="streamer-header">
            <img src="${s.profileImageUrl}" alt="${s.displayName}" class="streamer-avatar">
            <div class="streamer-info">
              <div class="streamer-name">${s.displayName}</div>
              <div class="streamer-id">${s.id}</div>
            </div>
          </div>
          <div class="streamer-status online">🔴 TRANSMITINDO AGORA</div>
          <div class="streamer-actions">
            <button class="action-btn" onclick="openStreamer('${s.id}')" style="flex: 1;">📺 Assistir</button>
          </div>
        </div>
      `).join('');
    }

    function updateStats() {
      const onlineCount = streamers.filter(s => s.isLive).length;
      document.getElementById('onlineCount').textContent = onlineCount;
      document.getElementById('totalMonitored').textContent = streamers.length;
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/stats', { credentials: 'include' });
        if (!res.ok) return;
        
        stats = await res.json();
        document.getElementById('totalUsers').textContent = stats.totalUsers || 0;
        
        const hours = Math.floor(stats.uptimeSeconds / 3600);
        document.getElementById('uptime').textContent = `${hours}h`;
      } catch (err) {
        console.error('[SODORAFA] Erro ao carregar stats:', err);
      }
    }

    function openStreamer(id) {
      const streamer = streamers.find(s => s.id === id);
      if (streamer) {
        window.open(`https://twitch.tv/${streamer.streamerName}`, '_blank');
      }
    }

    async function removeStreamer(id) {
      if (!confirm('Remover este streamer?')) return;
      
      try {
        const res = await fetch(`/api/streamers/${id}`, {
          method: 'DELETE',
          credentials: 'include'
        });
        if (res.ok) {
          loadStreamers();
        }
      } catch (err) {
        console.error('Erro ao remover:', err);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      checkAuth();
      loadStreamers();
      loadStats();
      setInterval(loadStreamers, 30000);
      setInterval(loadStats, 60000);
    });
  </script>
</body>
</html>
