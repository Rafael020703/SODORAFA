<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SODORAFA - Meu Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg-primary: #0a0e27;
      --bg-secondary: #111d44;
      --bg-tertiary: #1a2a5f;
      --border-color: #2d4a8a;
      --text-primary: #f0f4ff;
      --text-secondary: #b8c4e8;
      --text-tertiary: #8a98c8;
      --accent-blue: #4a9eff;
      --accent-cyan: #2dd4da;
      --accent-purple: #a78bfa;
      --accent-pink: #f472b6;
      --danger-color: #ff6b7a;
      --success-color: #4ade80;
      --discord-color: #5865F2;
      --radius-md: 12px;
      --radius-lg: 16px;
    }
    
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-primary) 0%, #0f1a35 50%, #0a0e27 100%);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }
    
    .container {
      width: min(1280px, 95vw);
      margin: 0 auto;
      padding: 20px;
    }
    
    /* Header & Navigation */
    .header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 20px;
      align-items: center;
      margin-bottom: 28px;
      background: rgba(17, 29, 68, 0.5);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(45, 74, 138, 0.4);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
    }
    
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .brand-logo {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      color: white;
      font-size: 20px;
    }
    
    .brand-info h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
    }
    
    .brand-info p {
      margin: 4px 0 0;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    
    .nav-links {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    
    .nav-links a {
      padding: 8px 16px;
      border-radius: var(--radius-md);
      text-decoration: none;
      color: var(--text-primary);
      transition: all 0.3s ease;
      font-size: 0.9rem;
      font-weight: 500;
    }
    
    .nav-links a.active {
      background: rgba(74, 158, 255, 0.2);
      border: 1px solid var(--accent-blue);
    }
    
    .nav-links a:hover:not(.active) {
      background: rgba(74, 158, 255, 0.1);
    }
    
    /* Glass Card */
    .glass-card {
      background: rgba(17, 29, 68, 0.4);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(45, 74, 138, 0.4);
      border-radius: var(--radius-lg);
      padding: 24px;
      transition: all 0.3s ease;
      margin-bottom: 20px;
    }
    
    .glass-card h2 {
      margin: 0 0 16px 0;
      font-size: 1.3rem;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .glass-card h2::before {
      content: '';
      width: 4px;
      height: 28px;
      background: linear-gradient(180deg, var(--accent-blue), var(--accent-cyan));
      border-radius: 2px;
    }
    
    /* Profile Header */
    .profile-header {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 20px;
      align-items: center;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(45, 74, 138, 0.3);
      margin-bottom: 20px;
    }
    
    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: var(--radius-lg);
      border: 2px solid var(--accent-blue);
      object-fit: cover;
      box-shadow: 0 0 20px rgba(74, 158, 255, 0.3);
    }
    
    .profile-info h1 {
      margin: 0 0 6px 0;
      font-size: 1.8rem;
      color: var(--text-primary);
    }
    
    .profile-info p {
      margin: 4px 0;
      color: var(--text-secondary);
      font-size: 0.95rem;
    }
    
    .profile-badges {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      background: rgba(74, 158, 255, 0.15);
      border: 1px solid rgba(74, 158, 255, 0.3);
      border-radius: 20px;
      font-size: 0.85rem;
      color: var(--accent-cyan);
    }
    
    .badge.discord {
      background: rgba(88, 101, 242, 0.15);
      border-color: rgba(88, 101, 242, 0.3);
      color: #5865F2;
    }
    
    .badge.active {
      background: rgba(74, 221, 128, 0.15);
      border-color: rgba(74, 221, 128, 0.3);
      color: #4ade80;
    }
    
    .profile-actions {
      display: flex;
      gap: 10px;
    }
    
    /* Grid Sections */
    .grid-2col {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 20px;
    }
    
    /* Buttons */
    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
      color: white;
      box-shadow: 0 4px 16px rgba(74, 158, 255, 0.3);
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(74, 158, 255, 0.4);
    }
    
    .btn-discord {
      background: linear-gradient(135deg, #5865F2, #4752C4);
      color: white;
      box-shadow: 0 4px 16px rgba(88, 101, 242, 0.3);
    }
    
    .btn-discord:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(88, 101, 242, 0.4);
    }
    
    .btn-secondary {
      background: rgba(45, 74, 138, 0.4);
      color: var(--text-primary);
      border: 1px solid rgba(45, 74, 138, 0.6);
    }
    
    .btn-secondary:hover {
      background: rgba(45, 74, 138, 0.6);
      border-color: var(--accent-blue);
    }
    
    .btn-danger {
      background: rgba(255, 107, 122, 0.2);
      color: var(--danger-color);
      border: 1px solid var(--danger-color);
    }
    
    .btn-danger:hover {
      background: rgba(255, 107, 122, 0.3);
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Forms */
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.9rem;
    }
    
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      background: rgba(10, 19, 49, 0.8);
      border: 1px solid rgba(45, 74, 138, 0.5);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }
    
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--accent-blue);
      box-shadow: 0 0 12px rgba(74, 158, 255, 0.2);
    }
    
    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }
    
    /* Streamer List */
    .streamer-item {
      background: rgba(10, 19, 49, 0.8);
      border: 1px solid rgba(45, 74, 138, 0.5);
      border-radius: var(--radius-md);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      transition: all 0.3s ease;
    }
    
    .streamer-item:hover {
      border-color: var(--accent-cyan);
      background: rgba(10, 19, 49, 1);
    }
    
    .streamer-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .streamer-avatar {
      width: 48px;
      height: 48px;
      border-radius: var(--radius-md);
      border: 1px solid var(--accent-cyan);
      object-fit: cover;
    }
    
    .streamer-details h3 {
      margin: 0;
      font-size: 1rem;
      color: var(--text-primary);
    }
    
    .streamer-details p {
      margin: 4px 0 0;
      font-size: 0.8rem;
      color: var(--text-tertiary);
    }
    
    .streamer-status {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    
    .status-online {
      background: rgba(74, 221, 128, 0.2);
      color: #4ade80;
    }
    
    .status-offline {
      background: rgba(138, 152, 200, 0.2);
      color: var(--text-tertiary);
    }
    
    /* Discord Connection */
    .discord-card {
      background: rgba(88, 101, 242, 0.1);
      border: 2px solid rgba(88, 101, 242, 0.3);
      border-radius: var(--radius-lg);
      padding: 20px;
      text-align: center;
    }
    
    .discord-card h3 {
      margin: 0 0 8px 0;
      color: #5865F2;
      font-size: 1.1rem;
    }
    
    .discord-card p {
      margin: 0 0 16px 0;
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    
    .discord-connected {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px;
      background: rgba(88, 101, 242, 0.15);
      border-radius: var(--radius-md);
      margin-bottom: 16px;
    }
    
    .discord-user {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }
    
    .discord-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      object-fit: cover;
    }
    
    .discord-info {
      text-align: left;
    }
    
    .discord-info p {
      margin: 0;
      color: var(--text-primary);
      font-weight: 600;
      font-size: 0.9rem;
    }
    
    .discord-info span {
      display: block;
      font-size: 0.75rem;
      color: var(--text-tertiary);
      margin-top: 2px;
    }
    
    /* Notification */
    #notifyModal {
      position: fixed;
      right: 20px;
      bottom: 20px;
      background: rgba(17, 29, 68, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(74, 158, 255, 0.3);
      border-radius: var(--radius-md);
      padding: 14px 18px;
      z-index: 9999;
      color: var(--text-primary);
      font-size: 0.9rem;
      animation: slideUp 0.3s ease;
    }
    
    @keyframes slideUp {
      from { 
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Modal */
    .modal {
      display: none;
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }
    
    .modal.active {
      display: flex;
    }
    
    .modal-content {
      background: linear-gradient(135deg, rgba(17, 29, 68, 0.95), rgba(26, 42, 95, 0.95));
      border: 1px solid rgba(74, 158, 255, 0.3);
      border-radius: var(--radius-lg);
      padding: 24px;
      width: 90%;
      max-width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }
    
    .modal-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin: 0 0 16px 0;
      color: var(--text-primary);
    }
    
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }
    
    /* Responsive */
    @media (max-width: 1024px) {
      .profile-header {
        grid-template-columns: 1fr;
      }
      
      .grid-2col {
        grid-template-columns: 1fr;
      }
      
      .header {
        grid-template-columns: 1fr;
      }
    }
    
    @media (max-width: 640px) {
      .container {
        padding: 12px;
      }
      
      .glass-card {
        padding: 16px;
      }
      
      .profile-avatar {
        width: 100px;
        height: 100px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="brand">
        <div class="brand-logo">S</div>
        <div class="brand-info">
          <h1>SODORAFA</h1>
          <p>Meu Perfil</p>
        </div>
      </div>
      <div class="nav-links">
        <a href="/home">🏠 Home</a>
        <a href="/dashboard">📊 Dashboard</a>
        <a href="/profile" class="active">👤 Perfil</a>
        <a href="/monitoring">📺 Monitorar</a>
        <a href="/logout" class="btn btn-secondary">🚪 Sair</a>
      </div>
    </div>

    <!-- Profile Section -->
    <div class="glass-card" id="profileSection">
      <div class="profile-header">
        <img id="profileAvatar" class="profile-avatar" src="" alt="Avatar" onerror="this.src='https://cdn.discordapp.com/embed/avatars/0.png'" />
        <div class="profile-info">
          <h1 id="profileName">—</h1>
          <p>ID: <code id="profileId">—</code></p>
          <p id="profileJoined">Membro desde: —</p>
          <div class="profile-badges">
            <span class="badge">👑 Broadcaster</span>
            <span id="discordBadge" class="badge discord" style="display:none;">💜 Discord Vinculado</span>
          </div>
        </div>
        <div class="profile-actions">
          <button class="btn btn-secondary" onclick="window.location.href='/index.html'">Voltar ao Dashboard</button>
        </div>
      </div>
    </div>

    <!-- Discord Integration Section -->
    <div class="glass-card">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 style="margin: 0;">💜 Discord</h2>
        <span id="discordBadge" style="display: none; background: #5865F2; color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.85em;">✓ Conectado</span>
      </div>
      <div id="discordSection">
        <div class="discord-card">
          <h3>💜 Conectar Discord</h3>
          <p>Vincule sua conta do Discord para receber notificações automáticas de lives</p>
          <button id="linkDiscordBtn" class="btn btn-discord" onclick="initiateDiscordAuth()">
            <span>🔗</span> Conectar com Discord
          </button>
        </div>
      </div>
    </div>

    <!-- Notification -->
    <div id="notifyModal" style="display:none;"></div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    let currentUser = null;
    let discordUser = null;
    let streamers = [];

    function showNotification(msg, duration = 3200, type = 'info') {
      const modal = document.getElementById('notifyModal');
      const colors = {
        success: '#4ade80',
        error: '#ff6b7a',
        info: '#4a9eff'
      };
      modal.textContent = msg;
      modal.style.color = colors[type] || colors.info;
      modal.style.display = 'block';
      clearTimeout(showNotification._t);
      showNotification._t = setTimeout(() => {
        modal.style.display = 'none';
      }, duration);
    }

    async function loadProfile() {
      try {
        console.log('[PROFILE] Carregando perfil do usuário...');
        const r = await fetch('/api/profile', { credentials: 'include' });
        
        console.log('[PROFILE] Response status:', r.status);
        
        if (r.status === 401) {
          console.warn('[PROFILE] Não autenticado, redirecionando para Twitch');
          window.location.href = '/auth/twitch';
          return;
        }
        if (!r.ok) {
          throw new Error(`Erro ao carregar perfil (status ${r.status})`);
        }

        const user = await r.json();
        console.log('[PROFILE] Perfil recebido:', {
          username: user.username,
          displayName: user.displayName,
          profileImageUrl: user.profileImageUrl,
          discordId: user.discordId
        });
        
        currentUser = user;

        // Update profile display
        document.getElementById('profileName').textContent = user.displayName || user.username;
        document.getElementById('profileId').textContent = user.id;
        
        const avatarUrl = user.profileImageUrl || user.avatar || '/img/default-avatar.png';
        console.log('[PROFILE] Avatar URL:', avatarUrl);
        const profileImg = document.getElementById('profileAvatar');
        profileImg.src = avatarUrl;
        profileImg.onerror = () => {
          console.error('[PROFILE] Erro ao carregar avatar:', avatarUrl);
          profileImg.src = '/img/default-avatar.png';
        };
        
        document.getElementById('profileJoined').textContent = `Membro desde: ${new Date(user.createdAt).toLocaleDateString('pt-BR')}`;

        // Load Discord info
        if (user.discordId) {
          console.log('[PROFILE] Discord conectado, mostrando informações');
          showDiscordConnected(user.discord);
        } else {
          console.log('[PROFILE] Discord não conectado');
        }

        // Load streamers
        loadStreamers();
        showNotification('✓ Perfil carregado com sucesso', 2000, 'success');
      } catch (err) {
        console.error('[PROFILE] Erro ao carregar perfil:', err);
        console.error('[PROFILE] Stack:', err.stack);
        showNotification('✗ Erro ao carregar perfil', 3000, 'error');
      }
    }

    function showDiscordConnected(discordData) {
      const badge = document.getElementById('discordBadge');
      badge.style.display = 'inline-flex';

      const section = document.getElementById('discordSection');
      section.innerHTML = `
        <div class="discord-connected">
          <div class="discord-user">
            <img class="discord-avatar" src="${discordData.avatar}" alt="Discord Avatar" />
            <div class="discord-info">
              <p><strong>${discordData.tag}</strong></p>
              <span style="font-size: 0.9em; color: var(--text-tertiary);">${discordData.email || 'Sem email'}</span>
              <p style="font-size: 0.85em; margin-top: 5px; color: var(--text-tertiary);">✓ Verificado: ${discordData.verified ? 'Sim' : 'Não'}</p>
            </div>
          </div>
          <div style="display: flex; gap: 10px; width: 100%;">
            <button class="btn btn-danger" onclick="unlinkDiscord()" style="flex: 1;">
              <span>❌</span> Desconectar
            </button>
          </div>
        </div>

      `;

      discordUser = discordData;
    }

    async function loadStreamers() {
      try {
        console.log('[PROFILE] Carregando lista de streamers monitorados...');
        const r = await fetch('/api/streamers', { credentials: 'include' });
        
        if (!r.ok) {
          throw new Error(`Erro ao carregar streamers (status ${r.status})`);
        }

        streamers = await r.json();
        console.log('[PROFILE] Streamers carregados:', streamers.length, 'streamers');
        renderStreamersList();
      } catch (err) {
        console.error('[PROFILE] Erro ao carregar streamers:', err);
        console.error('[PROFILE] Stack:', err.stack);
        showNotification('✗ Erro ao carregar streamers', 3000, 'error');
      }
    }

    function renderStreamersList() {
      const list = document.getElementById('streamersList');
      if (streamers.length === 0) {
        list.innerHTML = '<p style="text-align: center; color: var(--text-tertiary);">Nenhum streamer adicionado ainda</p>';
        return;
      }

      list.innerHTML = streamers.map(s => `
        <div class="streamer-item">
          <div class="streamer-info">
            <img class="streamer-avatar" src="${s.profileImageUrl}" alt="${s.displayName}" />
            <div class="streamer-details">
              <h3>${s.displayName}</h3>
              <p>ID: ${s.id}</p>
            </div>
          </div>
          <div class="streamer-status">
            <span class="status-badge ${s.isLive ? 'status-online' : 'status-offline'}">
              ${s.isLive ? '🔴 LIVE' : '⚫ Offline'}
            </span>
            <button class="btn btn-danger" onclick="removeStreamer('${s.id}')">
              <span>🗑️</span> Remover
            </button>
          </div>
        </div>
      `).join('');
    }

    function openAddStreamerModal() {
      document.getElementById('addStreamerModal').classList.add('active');
      document.getElementById('streamerNameInput').value = '';
      document.getElementById('discordChannelInput').value = '';
    }

    function closeAddStreamerModal() {
      document.getElementById('addStreamerModal').classList.remove('active');
    }

    async function addStreamer() {
      const name = document.getElementById('streamerNameInput').value.trim();
      const channelId = document.getElementById('discordChannelInput').value.trim();
      const ping = document.getElementById('pingNotifCheckbox').checked;

      console.log('[PROFILE] Adicionando streamer:', { name, channelId, ping });

      if (!name || !channelId || !discordUser) {
        console.warn('[PROFILE] Campos incompletos ou Discord não conectado');
        showNotification('✗ Preencha todos os campos', 2000, 'error');
        return;
      }

      try {
        const r = await fetch('/api/streamers', {
          method: 'POST',
          credentials: 'include',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ streamerName: name, discordChannelId: channelId, notifyEveryone: ping })
        });

        console.log('[PROFILE] Response status:', r.status);
        const j = await r.json();
        console.log('[PROFILE] Response data:', j);
        
        if (j.success) {
          showNotification('✓ Streamer adicionado com sucesso!', 2000, 'success');
          closeAddStreamerModal();
          loadStreamers();
        } else {
          console.warn('[PROFILE] Erro na resposta:', j.error);
          showNotification(`✗ ${j.error || 'Erro ao adicionar'}`, 3000, 'error');
        }
      } catch (err) {
        console.error('[PROFILE] Erro ao adicionar streamer:', err);
        console.error('[PROFILE] Stack:', err.stack);
        showNotification('✗ Erro ao adicionar streamer', 3000, 'error');
      }
    }

    async function removeStreamer(streamerId) {
      if (!confirm('Tem certeza que deseja remover este streamer?')) return;

      console.log('[PROFILE] Removendo streamer:', streamerId);

      try {
        const r = await fetch(`/api/streamers/${streamerId}`, {
          method: 'DELETE',
          credentials: 'include'
        });

        console.log('[PROFILE] Remove response status:', r.status);
        const j = await r.json();
        console.log('[PROFILE] Remove response:', j);
        
        if (j.success) {
          showNotification('✓ Streamer removido com sucesso!', 2000, 'success');
          loadStreamers();
        } else {
          console.warn('[PROFILE] Erro ao remover:', j.error);
          showNotification('✗ Erro ao remover streamer', 3000, 'error');
        }
      } catch (err) {
        console.error(err);
        showNotification('✗ Erro ao remover', 3000, 'error');
      }
    }





    function initiateDiscordAuth() {
      showNotification('🔄 Redirecionando para Discord...', 0);
      
      // Buscar CLIENT_ID do servidor
      fetch('/api/config')
        .then(res => res.json())
        .then(config => {
          const clientId = config.discordClientId;
          if (!clientId || clientId === 'SEU_DISCORD_CLIENT_ID') {
            showNotification('✗ Discord não configurado no servidor', 3000, 'error');
            return;
          }

          const redirectUri = `${window.location.origin}/auth/discord/callback`;
          const scopes = 'identify email';
          const state = Math.random().toString(36).substring(7);
          
          // Salvar state no sessionStorage para validação
          sessionStorage.setItem('discord_oauth_state', state);
          
          const authUrl = `https://discord.com/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=code&scope=${encodeURIComponent(scopes)}&state=${state}`;
          window.location.href = authUrl;
        })
        .catch(err => {
          console.error('Erro ao buscar configuração:', err);
          showNotification('✗ Erro ao conectar Discord. Tente novamente.', 3000, 'error');
        });
    }

    async function unlinkDiscord() {
      if (!confirm('Desconectar Discord? Você não receberá mais notificações de lives.')) return;

      try {
        showNotification('⏳ Desconectando Discord...', 0);

        const r = await fetch('/api/profile/discord', {
          method: 'DELETE',
          credentials: 'include'
        });

        const j = await r.json();
        if (j.success) {
          discordUser = null;
          currentUser.discordId = null;
          currentUser.discord = null;

          document.getElementById('discordBadge').style.display = 'none';
          document.getElementById('discordSection').innerHTML = `
            <div class="discord-card">
              <h3>💜 Conectar Discord</h3>
              <p>Vincule sua conta do Discord para receber notificações automáticas de lives</p>
              <button id="linkDiscordBtn" class="btn btn-discord" onclick="initiateDiscordAuth()">
                <span>🔗</span> Conectar com Discord
              </button>
            </div>
          `;
          showNotification('✅ Discord desconectado com sucesso!', 2000, 'success');
          
          // Re-attach listener
          document.getElementById('linkDiscordBtn').addEventListener('click', initiateDiscordAuth);
        } else {
          showNotification('✗ Erro ao desconectar', 3000, 'error');
        }
      } catch (err) {
        console.error(err);
        showNotification('✗ Erro ao desconectar Discord', 3000, 'error');
      }
    }

    // Event Listeners
    document.addEventListener('DOMContentLoaded', () => {
      // Verificar parâmetros de query para feedback pós-login/ações
      const params = new URLSearchParams(window.location.search);
      
      if (params.has('discord_linked')) {
        showNotification('✅ Discord vinculado com sucesso!', 3000, 'success');
        window.history.replaceState({}, document.title, '/profile');
      }
      
      if (params.has('error')) {
        const error = params.get('error');
        const errorMessages = {
          'discord_auth_failed': 'Falha na autenticação do Discord',
          'discord_auth_error': 'Erro ao conectar Discord',
          'no_code': 'Código de autorização não recebido'
        };
        showNotification(`✗ ${errorMessages[error] || 'Erro desconhecido'}`, 3000, 'error');
        window.history.replaceState({}, document.title, '/profile');
      }

      loadProfile();

      // Tentar adicionar listener ao botão, se existir
      const linkDiscordBtn = document.getElementById('linkDiscordBtn');
      if (linkDiscordBtn) {
        linkDiscordBtn.addEventListener('click', initiateDiscordAuth);
      }

      // Close modals on outside click
      window.addEventListener('click', (e) => {
        if (e.target.id === 'addStreamerModal') {
          closeAddStreamerModal();
        }
      });
    });
  </script>
</body>
